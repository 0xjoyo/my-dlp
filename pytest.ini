[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
filterwarnings =
    ignore::DeprecationWarning
markers =
    network: tests that need network access (deselect with -m "not network")
    slow: tests that take >1s